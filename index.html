<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Event Day Tracker — Sold / Gifted</title>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d0d0d;
    color: #f0f0ee;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 12px 14px 40px; }
  h1 { font-size: 17px; font-weight: 600; margin: 4px 0 2px; }
  .sub { font-size: 12px; color: #999; margin: 0 0 10px; }

  .sync-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: #888;
    margin-bottom: 14px;
  }
  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5dcaa5;
    flex: none;
    transition: background 0.2s ease;
  }
  .sync-dot.syncing { background: #e3a86f; animation: pulse 0.8s infinite ease-in-out; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .refresh-btn {
    margin-left: auto;
    flex: none;
    background: none;
    border: none;
    color: #5dcaa5;
    font-size: 11.5px;
    padding: 2px 6px;
    cursor: pointer;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .stat {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 10px 10px;
  }
  .stat-label { font-size: 10.5px; color: #999; margin: 0 0 2px; }
  .stat-value { font-size: 19px; font-weight: 600; margin: 0; }
  .stat.sold .stat-value { color: #6fb8e3; }
  .stat.gift .stat-value { color: #e3a86f; }

  .scan-area {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: none; }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-box {
    width: 78%;
    height: 32%;
    border: 2px solid #5dcaa5;
    border-radius: 10px;
    opacity: 0.85;
    transition: border-color 0.15s ease;
  }
  .scan-box.locked {
    border-color: #555;
    opacity: 0.5;
  }
  .flash-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
    opacity: 0;
    background: rgba(0,0,0,0.45);
    transition: opacity 0.12s ease;
  }
  .flash-overlay.show { opacity: 1; }
  .flash-icon { font-size: 52px; line-height: 1; }
  .flash-label { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .flash-sub { font-size: 13px; color: #ddd; font-weight: 500; text-align: center; padding: 0 20px; }
  .flash-overlay.sold .flash-icon, .flash-overlay.sold .flash-label { color: #6fb8e3; }
  .flash-overlay.gift .flash-icon, .flash-overlay.gift .flash-label { color: #e3a86f; }
  .flash-overlay.unknown .flash-icon, .flash-overlay.unknown .flash-label { color: #f09595; }

  .scan-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #777;
    font-size: 13px;
    text-align: center;
    padding: 0 20px;
  }

  .btn-row { display: flex; gap: 8px; margin-bottom: 14px; }
  button {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
  }
  .btn-primary { background: #5dcaa5; color: #04342c; }
  .btn-secondary { background: #262626; color: #f0f0ee; }
  .btn-danger { background: #2c1313; color: #f09595; }
  button:active { transform: scale(0.98); }

  .manual-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .manual-row input {
    flex: 1;
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #f0f0ee;
  }
  .manual-row button { flex: none; padding: 10px 16px; }

  #lock-hint { font-size: 12px; color: #666; text-align: center; margin: 0 0 10px; min-height: 16px; }

  .filters { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px; }
  .filters button {
    flex: none;
    font-size: 12px;
    padding: 6px 12px;
    background: #1a1a1a;
    color: #ccc;
  }
  .filters button.active { background: #5dcaa5; color: #04342c; }

  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 4px;
    border-top: 1px solid #1f1f1f;
    font-size: 13px;
  }
  .log-row:first-child { border-top: none; }
  .log-left { flex: 1; min-width: 0; }
  .log-name { font-weight: 500; }
  .log-meta { font-size: 11px; color: #999; margin-top: 2px; }
  .log-tag {
    flex: none;
    font-size: 10.5px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
    height: fit-content;
  }
  .tag-sold { background: #122c3d; color: #6fb8e3; }
  .tag-gift { background: #3d2a12; color: #e3a86f; }
  .log-del {
    flex: none;
    background: none;
    border: none;
    color: #666;
    font-size: 16px;
    padding: 0 4px;
    cursor: pointer;
  }

  .empty-log { color: #666; font-size: 13px; text-align: center; padding: 24px 0; }

  /* Tag modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.show { display: flex; }
  .modal-sheet {
    width: 100%;
    max-width: 480px;
    background: #161616;
    border-radius: 16px 16px 0 0;
    padding: 18px 18px 24px;
  }
  .modal-item-name { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .modal-item-code { font-size: 12px; color: #888; margin: 0 0 16px; font-family: monospace; }
  .modal-choice-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .modal-choice {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: 1.5px solid #333;
    background: #1d1d1d;
    color: #f0f0ee;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
  }
  .modal-choice.sold-choice { border-color: #2d5570; }
  .modal-choice.gift-choice { border-color: #6f4d23; }
  .modal-choice:active { transform: scale(0.97); }
  .recipient-row { display: none; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .recipient-row.show { display: flex; }
  .recipient-row input {
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #f0f0ee;
  }
  .recipient-row label { font-size: 12px; color: #999; }
  .modal-confirm { display: none; }
  .modal-confirm.show { display: block; }
  .modal-cancel {
    background: none;
    color: #777;
    font-size: 13px;
    padding: 8px;
  }

  .save-note { font-size: 11px; color: #666; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

  <h1>Event day tracker</h1>
  <p class="sub">Shared log — everyone with this link sees the same scans, live.</p>
  <div class="sync-row">
    <span id="sync-status" class="sync-dot"></span>
    <span id="sync-label">Synced</span>
    <button id="refresh-btn" class="refresh-btn" aria-label="Refresh now">⟳ Refresh</button>
  </div>

  <div class="stats">
    <div class="stat">
      <p class="stat-label">Total logged</p>
      <p class="stat-value" id="stat-total">0</p>
    </div>
    <div class="stat sold">
      <p class="stat-label">Sold</p>
      <p class="stat-value" id="stat-sold">0</p>
    </div>
    <div class="stat gift">
      <p class="stat-label">Gifted</p>
      <p class="stat-value" id="stat-gift">0</p>
    </div>
  </div>

  <div class="scan-area">
    <video id="video" muted playsinline></video>
    <div class="scan-placeholder" id="scan-placeholder">
      <span>Tap "start camera" to scan barcodes live</span>
    </div>
    <div class="scan-overlay" id="scan-overlay" style="display:none;">
      <div class="scan-box" id="scan-box"></div>
    </div>
    <div class="flash-overlay" id="flash-overlay">
      <div class="flash-icon" id="flash-icon"></div>
      <div class="flash-label" id="flash-label"></div>
      <div class="flash-sub" id="flash-sub"></div>
    </div>
  </div>
  <p id="lock-hint"></p>

  <div class="btn-row">
    <button class="btn-primary" id="start-btn">Start camera</button>
    <button class="btn-secondary" id="stop-btn" style="display:none;">Stop camera</button>
  </div>

  <div class="manual-row">
    <input type="text" id="manual-input" placeholder="Or type/paste a barcode" inputmode="numeric" />
    <button class="btn-secondary" id="manual-add">Add</button>
  </div>

  <div class="filters">
    <button data-f="all" class="active">All</button>
    <button data-f="sold">Sold</button>
    <button data-f="gift">Gifted</button>
  </div>

  <div id="log-list"></div>

  <div class="btn-row" style="margin-top:18px;">
    <button class="btn-secondary" id="export-btn">Export log (.csv)</button>
    <button class="btn-danger" id="reset-btn">Reset all</button>
  </div>

  <p class="save-note">Progress is saved on this device automatically.</p>

</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal-sheet">
    <p class="modal-item-name" id="modal-item-name"></p>
    <p class="modal-item-code" id="modal-item-code"></p>

    <div class="modal-choice-row" id="modal-choice-row">
      <div class="modal-choice sold-choice" id="choice-sold">Sold</div>
      <div class="modal-choice gift-choice" id="choice-gift">Gift</div>
    </div>

    <div class="recipient-row" id="recipient-row">
      <label for="recipient-input">Recipient name</label>
      <input type="text" id="recipient-input" placeholder="e.g. Trisha Vaz" autocomplete="off" />
      <button class="btn-primary" id="confirm-gift" style="margin-top:4px;">Confirm gift</button>
    </div>

    <button class="modal-cancel" id="modal-cancel">Cancel this scan</button>
  </div>
</div>

const STORAGE_PREFIX = 'event-day-entry:';
const barcodeMap = {};
manifest.forEach(m => { if (m.barcode) barcodeMap[m.barcode] = m; });

let log = []; // [{id, code, barcode, name, type: 'sold'|'gift', recipient, ts}] — synced from shared storage
let currentFilter = 'all';
let codeReader = null;
let scanning = false;
let pollTimer = null;
const POLL_INTERVAL_MS = 4000;
let isSyncing = false;

// Lock state — same engine as the transfer scanner: a code stays locked until
// a different code appears or the camera sees no barcode for a few frames.
// While the tag modal is open, scanning is fully paused (modalOpen = true)
// so nothing fires while you're choosing Sold/Gift or typing a name.
let lockedCode = null;
let missStreak = 0;
const MISS_THRESHOLD = 4;
let modalOpen = false;
let pendingItem = null; // {code, barcode, name} awaiting a tag decision

// Each scan is its own shared key (event-day-entry:<id>), never a shared array.
// This means two phones scanning at the same moment write to DIFFERENT keys —
// there is no read-modify-write step on shared data, so one person's scan can
// never overwrite or erase another person's. Reading the full log means
// listing all keys with this prefix and fetching each one.
async function loadLog(showSyncState) {
  if (showSyncState) {
    isSyncing = true;
    setSyncUi(true);
  }
  try {
    const listResult = await window.storage.list(STORAGE_PREFIX, true);
    const keys = (listResult && listResult.keys) || [];
    const entries = [];
    for (const key of keys) {
      try {
        const result = await window.storage.get(key, true);
        if (result && result.value) {
          entries.push(JSON.parse(result.value));
        }
      } catch (e) { /* skip unreadable entry */ }
    }
    entries.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    log = entries;
    setSyncLabel('Synced');
  } catch (e) {
    setSyncLabel('Offline — showing last known data');
  }
  isSyncing = false;
  setSyncUi(false);
  render();
}

function setSyncUi(syncing) {
  const dot = document.getElementById('sync-status');
  if (!dot) return;
  dot.classList.toggle('syncing', syncing);
  if (syncing) setSyncLabel('Syncing…');
}

function setSyncLabel(text) {
  const label = document.getElementById('sync-label');
  if (label) label.textContent = text;
}

async function saveEntry(entry) {
  try {
    await window.storage.set(STORAGE_PREFIX + entry.id, JSON.stringify(entry), true);
  } catch (e) {
    flash('unknown', '!', 'SAVE FAILED', 'Could not save — check connection and try again');
  }
}

async function deleteEntryRemote(id) {
  try {
    await window.storage.delete(STORAGE_PREFIX + id, true);
  } catch (e) {}
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => loadLog(false), POLL_INTERVAL_MS);
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

let flashTimer = null;
function flash(kind, icon, label, sub) {
  const overlay = document.getElementById('flash-overlay');
  overlay.className = `flash-overlay show ${kind}`;
  document.getElementById('flash-icon').textContent = icon;
  document.getElementById('flash-label').textContent = label;
  document.getElementById('flash-sub').textContent = sub || '';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { overlay.className = 'flash-overlay'; }, 1100);
}

function updateLockHint() {
  const hint = document.getElementById('lock-hint');
  if (!hint) return;
  if (modalOpen) {
    hint.textContent = 'Choose Sold or Gift below to continue scanning';
  } else if (lockedCode) {
    hint.textContent = 'Locked — move to next item to continue scanning';
  } else {
    hint.textContent = '';
  }
}

function handleFrame(result) {
  if (modalOpen) return; // fully paused while tagging
  if (!result) {
    missStreak++;
    if (lockedCode && missStreak >= MISS_THRESHOLD) {
      lockedCode = null;
      const scanBox = document.getElementById('scan-box');
      if (scanBox) scanBox.classList.remove('locked');
      updateLockHint();
    }
    return;
  }
  missStreak = 0;
  const code = result.getText().trim();
  if (!code) return;
  if (code === lockedCode) return; // same item still in frame

  lockedCode = code;
  const scanBox = document.getElementById('scan-box');
  if (scanBox) scanBox.classList.add('locked');
  updateLockHint();
  openTagModal(code);
}

function openTagModal(code) {
  const item = barcodeMap[code];
  modalOpen = true;
  updateLockHint();

  if (!item) {
    vibrate([40, 60, 40, 60, 40, 60, 40]);
    flash('unknown', '?', 'UNKNOWN', `${code} not in manifest`);
    // Still let them tag it manually with the raw code, in case it's a real
    // item whose barcode wasn't in the original sheet.
    pendingItem = { code: code, barcode: code, name: `Unrecognized item (${code})` };
  } else {
    vibrate([45]);
    pendingItem = { code: item.code, barcode: item.barcode, name: item.name };
  }

  document.getElementById('modal-item-name').textContent = pendingItem.name;
  document.getElementById('modal-item-code').textContent = pendingItem.barcode;
  document.getElementById('modal-choice-row').style.display = 'flex';
  document.getElementById('recipient-row').classList.remove('show');
  document.getElementById('recipient-input').value = '';
  document.getElementById('modal-backdrop').classList.add('show');
}

function closeModalAndResume() {
  document.getElementById('modal-backdrop').classList.remove('show');
  pendingItem = null;
  modalOpen = false;
  missStreak = 0; // give the box a moment to be moved away before re-arming
  updateLockHint();
}

async function commitLog(type, recipient) {
  if (!pendingItem) return;
  const entry = {
    id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
    code: pendingItem.code,
    barcode: pendingItem.barcode,
    name: pendingItem.name,
    type: type,
    recipient: recipient || '',
    ts: new Date().toISOString()
  };

  // Optimistic local update so the person scanning sees it instantly,
  // without waiting on a network round trip.
  log.unshift(entry);
  render();

  if (type === 'sold') {
    vibrate([150]);
    flash('sold', '$', 'SOLD', pendingItem.name);
  } else {
    vibrate([80, 60, 80]);
    flash('gift', '🎁', 'GIFTED', recipient ? `${pendingItem.name} → ${recipient}` : pendingItem.name);
  }

  closeModalAndResume();
  await saveEntry(entry);
}

document.getElementById('choice-sold').addEventListener('click', () => {
  commitLog('sold', '');
});

document.getElementById('choice-gift').addEventListener('click', () => {
  document.getElementById('modal-choice-row').style.display = 'none';
  document.getElementById('recipient-row').classList.add('show');
  document.getElementById('recipient-input').focus();
});

document.getElementById('confirm-gift').addEventListener('click', () => {
  const recipient = document.getElementById('recipient-input').value.trim();
  if (!recipient) {
    document.getElementById('recipient-input').placeholder = 'Recipient name is required';
    document.getElementById('recipient-input').focus();
    return;
  }
  commitLog('gift', recipient);
});

document.getElementById('recipient-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('confirm-gift').click();
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  closeModalAndResume();
});

// Manual barcode entry — same tag modal flow, just triggered without the camera.
function handleManualScan(raw) {
  const code = String(raw).trim();
  if (!code) return;
  modalOpen = true;
  openTagModal(code);
}

document.getElementById('manual-add').addEventListener('click', () => {
  const input = document.getElementById('manual-input');
  handleManualScan(input.value);
  input.value = '';
});
document.getElementById('manual-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    handleManualScan(e.target.value);
    e.target.value = '';
  }
});

async function startCamera() {
  const video = document.getElementById('video');
  const placeholder = document.getElementById('scan-placeholder');
  const overlay = document.getElementById('scan-overlay');
  const startBtn = document.getElementById('start-btn');
  const stopBtn = document.getElementById('stop-btn');

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    let deviceId = null;
    const backCam = cams.find(d => /back|rear|environment/i.test(d.label));
    if (backCam) deviceId = backCam.deviceId;

    video.style.display = 'block';
    placeholder.style.display = 'none';
    overlay.style.display = 'flex';
    startBtn.style.display = 'none';
    stopBtn.style.display = 'block';
    scanning = true;
    lockedCode = null;
    missStreak = 0;
    updateLockHint();

    const constraints = deviceId
      ? { deviceId: { exact: deviceId } }
      : { facingMode: { ideal: 'environment' } };

    codeReader.decodeFromConstraints({ video: constraints }, video, (result, err) => {
      if (!scanning) return;
      handleFrame(result || null);
    });
  } catch (e) {
    flash('unknown', '!', 'CAMERA ERROR', e.message || e.name || 'unknown error');
    stopCamera();
  }
}

function stopCamera() {
  scanning = false;
  lockedCode = null;
  missStreak = 0;
  updateLockHint();
  if (codeReader) {
    try { codeReader.reset(); } catch (e) {}
    codeReader = null;
  }
  document.getElementById('video').style.display = 'none';
  document.getElementById('scan-placeholder').style.display = 'flex';
  document.getElementById('scan-overlay').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('stop-btn').style.display = 'none';
}

document.getElementById('start-btn').addEventListener('click', startCamera);
document.getElementById('stop-btn').addEventListener('click', stopCamera);
document.getElementById('refresh-btn').addEventListener('click', () => loadLog(true));

document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.f;
    render();
  });
});

async function deleteEntry(id) {
  log = log.filter(e => e.id !== id);
  render();
  await deleteEntryRemote(id);
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function render() {
  const soldCount = log.filter(e => e.type === 'sold').length;
  const giftCount = log.filter(e => e.type === 'gift').length;
  document.getElementById('stat-total').textContent = log.length;
  document.getElementById('stat-sold').textContent = soldCount;
  document.getElementById('stat-gift').textContent = giftCount;

  const list = document.getElementById('log-list');
  const filtered = currentFilter === 'all' ? log : log.filter(e => e.type === currentFilter);

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-log">No items logged yet</div>';
    return;
  }

  list.innerHTML = filtered.map(e => `
    <div class="log-row">
      <div class="log-left">
        <div class="log-name">${e.name}</div>
        <div class="log-meta">${formatTime(e.ts)}${e.type === 'gift' && e.recipient ? ' · ' + e.recipient : ''}</div>
      </div>
      <span class="log-tag ${e.type === 'sold' ? 'tag-sold' : 'tag-gift'}">${e.type === 'sold' ? 'SOLD' : 'GIFT'}</span>
      <button class="log-del" onclick="deleteEntry('${e.id}')" aria-label="Delete entry">✕</button>
    </div>
  `).join('');
}

document.getElementById('reset-btn').addEventListener('click', async () => {
  if (!confirm('Clear the ENTIRE shared event log for everyone using this link? This cannot be undone.')) return;
  const idsToDelete = log.map(e => e.id);
  log = [];
  render();
  for (const id of idsToDelete) {
    await deleteEntryRemote(id);
  }
  await loadLog(true);
});

document.getElementById('export-btn').addEventListener('click', () => {
  let csv = 'Time,Item Code,Barcode,Item Name,Type,Recipient\n';
  log.slice().reverse().forEach(e => {
    csv += `"${new Date(e.ts).toLocaleString()}","${e.code}","${e.barcode}","${e.name}","${e.type}","${e.recipient}"\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'event-day-log.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

loadLog(true).then(startPolling);

// Refresh immediately whenever the tab/page becomes visible again —
// covers the case where someone locks their phone mid-event and comes back.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') loadLog(false);
});
</script>
</body>
</html>
